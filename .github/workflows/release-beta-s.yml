# Self-hosted release-beta lane. Hosted baseline remains release-beta.yml.
name: release-beta-s

on:
  workflow_dispatch:
    inputs:
      enable_win:
        description: "Run the Windows self-hosted beta lane."
        required: true
        type: boolean
        default: true
      publish:
        description: "Publish release assets and metadata. Keep disabled while validating the runner lane."
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: release-beta-s-win
  cancel-in-progress: false

jobs:
  windows_probe:
    name: Probe Windows self-hosted runner
    if: ${{ inputs.enable_win }}
    runs-on: [self-hosted, Windows, X64, nexu-win, release-beta]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Verify preinstalled toolchain
        shell: cmd
        run: |
          @echo on
          where.exe git || exit /b 1
          where.exe git-lfs || exit /b 1
          if not exist "C:\Users\runner\.cargo\bin\fnm.exe" exit /b 1
          if not exist "C:\Users\runner\.cargo\bin\cargo.exe" exit /b 1
          if not exist "C:\Program Files (x86)\NSIS\makensis.exe" exit /b 1
          git --version
          git lfs version
          "C:\Users\runner\.cargo\bin\fnm.exe" exec --using=24 -- node --version
          "C:\Users\runner\.cargo\bin\fnm.exe" exec --using=24 -- pnpm.cmd --version
          "C:\Users\runner\.cargo\bin\cargo.exe" --version
          "C:\Program Files (x86)\NSIS\makensis.exe" /VERSION

      - name: Confirm workflow boundary
        shell: cmd
        run: |
          @echo on
          echo workspace=%GITHUB_WORKSPACE%
          echo runner_temp=%RUNNER_TEMP%
          echo runner_tool_cache=%RUNNER_TOOL_CACHE%
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "if ($env:GITHUB_WORKSPACE -like 'C:\Users\runner\Projects\*') { throw 'GITHUB_WORKSPACE must not point at the operator Projects directory' }"
